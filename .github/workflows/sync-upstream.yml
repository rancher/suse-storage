name: Sync with Upstream

on:
  schedule:
  - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  repo-sync:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        persist-credentials: false
    - name: repo-sync
      uses: rancher/gh-issue-mgr/github-sync@b70f0bdf12a03e5e3f33e4f92ccb6c89deb3ebd9 # main
      with:
        source_repo: "https://github.com/longhorn/longhorn.git"
        source_branch: "v*.*.x"
        destination_branch: "v*.*.x"
        sync_tags: "true"
        github_token: ${{ secrets.CUSTOM_GITHUB_TOKEN }}
